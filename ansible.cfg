[defaults]
roles_path = ./roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
deprecation_warnings = False
error_on_undefined_vars = True

# IMPORTANT:
# Inventory, logs, and caches are controlled by AAP
# DO NOT define inventory, log_path, or fact_caching here

bin_ansible_callbacks = True

# Performance (safe)
forks = 5
timeout = 30
gathering = smart

# Display
display_skipped_hosts = False
display_args_to_stdout = False

[privilege_escalation]
become = False

[ssh_connection]
pipelining = True

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan