---
# Application Deletion Task
# Deletes a single application from destination by name

- name: "Delete Application | Debug - Current application info"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Deleting Application #{{ deletion_index + 1 }}"
      - "Name: {{ deletion_item }}"
      - "=========================================="
  when: enable_debug | default(false)
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | Debug - Request details"
  ansible.builtin.debug:
    msg:
      - "Request URL: {{ dst_tenant }}/v1.0/applications"
      - "Method: GET (to find application by name)"
      - "Filter: name eq '{{ deletion_item }}'"
      - "Headers:"
      - "  - Authorization: Bearer {{ dst_access_token[:20] }}..."
      - "  - Accept: application/json"
  when: enable_debug | default(false)
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | GET applications from destination to find by name"
  ansible.builtin.uri:
    url: "{{ dst_tenant }}/v1.0/applications"
    method: GET
    headers:
      Authorization: "Bearer {{ dst_access_token }}"
      Accept: "application/json"
    status_code: [200]
    timeout: "{{ http_timeout }}"
    validate_certs: yes
  register: dst_applications_list_response
  failed_when: false
  tags:
    - deletion
    - application

- name: "Delete Application | Debug - API response structure"
  ansible.builtin.debug:
    msg:
      - "API Response Keys: {{ dst_applications_list_response.json.keys() | list }}"
      - "Full Response: {{ dst_applications_list_response.json }}"
  when: enable_debug | default(false)
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | Find application ID by name"
  ansible.builtin.set_fact:
    found_application: "{{ dst_applications_list_response.json._embedded.applications | selectattr('name', 'equalto', deletion_item) | list | first | default(none) }}"
  when: dst_applications_list_response.status == 200
  tags:
    - deletion
    - application

- name: "Delete Application | Extract application ID from href"
  ansible.builtin.set_fact:
    application_id: "{{ found_application._links.self.href | regex_replace('^.*/applications/(.*)$', '\\1') }}"
  when:
    - found_application is defined
    - found_application is mapping
    - found_application | length > 0
  tags:
    - deletion
    - application

- name: "Delete Application | Debug - Application search result"
  ansible.builtin.debug:
    msg:
      - "Application search result:"
      - "Found: {{ found_application is not none }}"
      - "Application ID: {{ application_id | default('N/A') }}"
      - "Application Name: {{ found_application.name | default('N/A') }}"
      - "Application href: {{ found_application._links.self.href | default('N/A') }}"
  when: enable_debug | default(false)
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | DELETE application from destination"
  ansible.builtin.uri:
    url: "{{ dst_tenant }}/v1.0/applications/{{ application_id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ dst_access_token }}"
      Accept: "application/json"
    status_code: [200, 204, 404, 500]
    timeout: "{{ http_timeout }}"
    validate_certs: yes
  register: application_deletion_response
  failed_when: false
  changed_when: application_deletion_response.status in [200, 204]
  when:
    - found_application is defined
    - found_application is mapping
    - found_application | length > 0
  tags:
    - deletion
    - application

- name: "Delete Application | Skip deletion - Application not found"
  ansible.builtin.debug:
    msg: "⚠ Application '{{ deletion_item }}' not found in destination - skipping deletion"
  when: found_application is not mapping or (found_application | default({}) | length == 0)
  tags:
    - deletion
    - application

- name: "Delete Application | Debug - Deletion response"
  ansible.builtin.debug:
    msg:
      - "✓ Application deleted successfully"
      - "Status: {{ application_deletion_response.status }}"
      - "Application ID: {{ application_id }}"
      - "Application Name: {{ deletion_item }}"
      - "Response Body: {{ application_deletion_response.json | default('No content') }}"
  when:
    - enable_debug | default(false)
    - found_application is mapping
    - application_deletion_response.status in [200, 204]
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | Debug - Application not found during deletion"
  ansible.builtin.debug:
    msg:
      - "⚠ Application not found during deletion (already deleted)"
      - "Status: {{ application_deletion_response.status }}"
      - "Application Name: {{ deletion_item }}"
  when:
    - enable_debug | default(false)
    - found_application is mapping
    - application_deletion_response.status == 404
  tags:
    - deletion
    - application
    - debug

- name: "Delete Application | Debug - Server error"
  ansible.builtin.debug:
    msg:
      - "⚠ Server error during deletion"
      - "Status: {{ application_deletion_response.status }}"
      - "Application ID: {{ application_id }}"
      - "Application Name: {{ deletion_item }}"
      - "Message: {{ application_deletion_response.json.messageDescription | default('Internal Server Error') }}"
      - "Message ID: {{ application_deletion_response.json.messageId | default('N/A') }}"
      - "Full Response: {{ application_deletion_response.json | default({}) }}"
  when:
    - enable_debug | default(false)
    - found_application is mapping
    - application_deletion_response.status == 500
  tags:
    - deletion
    - application
    - debug


- name: "Delete Application | Success message"
  ansible.builtin.debug:
    msg: "✓ Application '{{ deletion_item }}' (ID: {{ application_id }}) deleted successfully"
  when:
    - found_application is mapping
    - application_deletion_response.status in [200, 204]
  tags:
    - deletion
    - application

- name: "Delete Application | Skip message - Not found during deletion"
  ansible.builtin.debug:
    msg: "⚠ Application '{{ deletion_item }}' (ID: {{ application_id }}) not found - already deleted"
  when:
    - found_application is mapping
    - application_deletion_response.status == 404
  tags:
    - deletion
    - application

- name: "Delete Application | Skip message - Server error"
  ansible.builtin.debug:
    msg: "⚠ Application '{{ deletion_item }}' (ID: {{ application_id }}) deletion failed - server error ({{ application_deletion_response.json.messageDescription | default('Internal Server Error') }})"
  when:
    - found_application is mapping
    - application_deletion_response.status == 500
  tags:
    - deletion
    - application

