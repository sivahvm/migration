---
# Application Management Role - Main Tasks
# Corporate Standard - Application CRUD Operations

- name: "Application Management | Display operation information"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Application Management Operations"
      - "Environment: {{ environment_type | default('unknown') }}"
      - "Operation: {{ operation | default('list') }}"
      - "=========================================="
  tags:
    - application
    - management

- name: "Application Management | Get list of applications"
  ansible.builtin.uri:
    url: "{{ tenant_url }}/v1.0/applications"
    method: GET
    headers:
      Authorization: "Bearer {{ access_token }}"
      Content-Type: "application/json"
    status_code: 200
    timeout: "{{ http_timeout }}"
    validate_certs: yes
  register: applications_response
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: applications_response.status == 200
  when: operation | default('list') in ['list', 'get', 'migrate']
  tags:
    - application
    - list

- name: "Application Management | Debug - Applications list"
  ansible.builtin.debug:
    msg:
      - "Total applications found: {{ applications_response.json._embedded.applications | length }}"
      - "Applications:"
  when: 
    - enable_debug | default(false)
    - applications_response.json._embedded.applications is defined
  tags:
    - application
    - list
    - debug

- name: "Application Management | Debug - Application names"
  ansible.builtin.debug:
    msg: "  - {{ item.name }} (ID: {{ item.id | default('N/A') }})"
  loop: "{{ applications_response.json._embedded.applications }}"
  loop_control:
    label: "{{ item.name }}"
  when: 
    - enable_debug | default(false)
    - applications_response.json._embedded.applications is defined
  tags:
    - application
    - list
    - debug

- name: "Application Management | Set applications list fact"
  ansible.builtin.set_fact:
    applications_list: "{{ applications_response.json._embedded.applications }}"
  when: applications_response.json._embedded.applications is defined
  tags:
    - application
    - list

- name: "Application Management | Filter applications by ID list"
  ansible.builtin.set_fact:
    applications_list: >-
      {{
        applications_list | selectattr('_links.self.href', 'defined') |
        selectattr('_links.self.href', 'search', '(' + filter_application_ids | join('|') + ')') |
        list
      }}
  when:
    - applications_list is defined
    - filter_application_ids is defined
    - filter_application_ids | length > 0
  tags:
    - application
    - list
    - filter

- name: "Application Management | Debug - Filtered applications"
  ansible.builtin.debug:
    msg:
      - "Filter applied: {{ filter_application_ids | length }} application IDs specified"
      - "Applications after filtering: {{ applications_list | length }}"
  when:
    - enable_debug | default(false)
    - filter_application_ids is defined
    - filter_application_ids | length > 0
  tags:
    - application
    - list
    - filter
    - debug

- name: "Application Management | Process each application"
  ansible.builtin.include_tasks: process_application.yml
  loop: "{{ applications_list }}"
  loop_control:
    loop_var: current_application
    index_var: app_index
    label: "{{ current_application.name }}"
  when: 
    - applications_list is defined
    - applications_list | length > 0
    - operation | default('list') in ['get', 'migrate']
  tags:
    - application
    - process

- name: "Application Management | Summary"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Application Management Summary"
      - "Total applications processed: {{ applications_list | length }}"
      - "Operation completed successfully"
      - "=========================================="
  when: applications_list is defined
  tags:
    - application
    - summary

# Made with Bob
