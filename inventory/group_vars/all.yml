---
# Global Variables for All Hosts
# Corporate Standard Configuration

# API Configuration
api_version: "v1.0"
http_timeout: 30
retry_count: 3
retry_delay: 5

# OAuth Configuration
oauth_grant_type: "client_credentials"
oauth_token_endpoint: "/oauth2/token"

# Logging Configuration
log_level: "DEBUG"
enable_debug: true
log_file_path: "/var/log/ansible/api_management.log"

# Corporate Standards
company_name: "H1 Corporation"
project_name: "API Management Automation"
environment: "{{ environment_type | default('development') }}"

# Migration Control Flags
# Enable or disable specific migration operations
enable_application_deletion: true  # Set to true to delete applications from destination
enable_application_migration: true   # Set to false to skip application migration
enable_attribute_migration: true    # Set to false to skip attribute migration
#enable_workflow_deletion:      # Set to true to delete workflows from destination
#enable_workflow_migration: true     # Set to false to skip workflow migration

# Filter Configuration
# Specify application IDs to process (empty list means process all)
# Use the numeric ID from the href path: /appaccess/v1.0/applications/129538061996185618
filter_application_ids: ["7004360933244180301","571881996528079756","4581306285137041939"]
# Example: filter_application_ids: ["129538061996185618", "129538061996185619"]

# Specify application names to delete from destination (empty list means delete none)
delete_application_names: ["IAM DEV Vendor1", "IAM DEV Vendor2", "migrationTest"]
# Example: delete_application_names: ["My App 1", "My App 2"]

# Specify attribute IDs to process (empty list means process all)
#filter_attribute_ids: ["2eaaac43-7b0e-48da-b393-f9d24aed6a08","0f64c64a-30c5-4609-b29e-72b384af7704"]
# Example: filter_attribute_ids: ["7", "8", "9"]

# Specify attribute names to process (empty list means process all)
filter_attribute_names: ["carModel", "ageHome"]
# Example: filter_attribute_names: ["carModel", "ageHome"]

# Specify workflow names to process (empty list means process all)
filter_workflow_names: []
# Example: filter_workflow_names: ["User Registration", "Password Reset"]

# Specify workflow names to delete from destination (empty list means delete none)
delete_workflow_names: []
# Example: delete_workflow_names: ["Old Workflow 1", "Old Workflow 2"]

# Made with Bob
